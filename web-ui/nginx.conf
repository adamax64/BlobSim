server {
    listen 80;
    server_name ${SERVER_NAME};
    root ${ROOT_PATH};
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache static assets
    location ~* \.(?:js|css|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
